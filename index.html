<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Czytnik Książek</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0c0c0e;
  --surface:#141417;
  --surface2:#1c1c21;
  --border:rgba(255,255,255,0.07);
  --text:#f0ede8;
  --muted:#6b6878;
  --accent:#e8d9c0;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:ui-monospace,'Cascadia Code','Menlo',monospace;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:56px 20px 80px;
  background-image:
    radial-gradient(ellipse 60% 40% at 70% 10%,rgba(180,140,80,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 50% at 10% 80%,rgba(100,80,160,.05) 0%,transparent 60%);
}

header{text-align:center;margin-bottom:52px;animation:fadeUp .7s ease both}
.lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,7vw,3.2rem);font-weight:400;color:var(--accent);line-height:1.15}
h1 em{font-style:italic;opacity:.55}

.card{
  width:100%;max-width:560px;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:32px 28px 28px;margin-bottom:36px;
  animation:fadeUp .7s .1s ease both;
}

.field{margin-bottom:20px}
.field label{display:block;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:13px 15px;font-family:inherit;font-size:14px;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
.field input[type=number]{-moz-appearance:textfield}
.field input[type=number]::-webkit-outer-spin-button,
.field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.field input::placeholder{color:var(--muted)}
.field input:focus{border-color:rgba(232,217,192,.35);box-shadow:0 0 0 3px rgba(232,217,192,.07)}

.row{display:flex;gap:14px}
.row .field{flex:1}

.add-btn{
  width:100%;padding:14px;background:var(--accent);color:#0c0c0e;
  border:none;border-radius:10px;font-family:inherit;font-size:11px;
  letter-spacing:.2em;text-transform:uppercase;font-weight:600;
  cursor:pointer;margin-top:2px;-webkit-appearance:none;appearance:none;
  transition:opacity .2s;
}
.add-btn:active{opacity:.8}

#books-list{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}

.book-item{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:22px 24px 20px;position:relative;overflow:hidden;
  animation:fadeUp .45s ease both;
}
.book-item::before{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  border-radius:16px 0 0 16px;background:var(--bc,#888);transition:background .5s;
}

.book-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.book-name{font-family:Georgia,serif;font-size:17px;color:var(--text);line-height:1.3;word-break:break-word}
.book-pct{font-size:24px;font-weight:300;white-space:nowrap;line-height:1}

.read-row{display:flex;align-items:center;gap:8px;margin-bottom:13px;flex-wrap:wrap}
.step-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:16px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;padding:0;font-family:inherit;
  -webkit-appearance:none;appearance:none;transition:color .15s,border-color .15s;
}
.step-btn:active{color:var(--accent);border-color:rgba(232,217,192,.4)}

.ri{
  width:68px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:5px 9px;font-family:inherit;font-size:13px;
  color:var(--text);outline:none;text-align:center;
  -moz-appearance:textfield;-webkit-appearance:none;appearance:none;
  transition:border-color .2s;
}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}
.ri:focus{border-color:rgba(232,217,192,.35)}

.sep,.total-lbl{font-size:12px;color:var(--muted)}

.bar-track{width:100%;height:5px;background:var(--surface2);border-radius:99px;position:relative;overflow:visible}
.bar-fill{
  height:100%;border-radius:99px;background:var(--bc,#888);position:relative;
  transition:width .7s cubic-bezier(.4,0,.2,1),background .5s;
}
.bar-fill::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  width:9px;height:9px;border-radius:50%;
  background:var(--bc,#888);box-shadow:0 0 8px var(--bc,#888);transition:background .5s;
}

.book-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:8px}
.pages-left{font-size:11px;color:var(--muted);letter-spacing:.08em}

.foot-right{display:flex;align-items:center;gap:8px}
.badge{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  padding:3px 8px;border-radius:99px;
}
.del-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:20px;line-height:1;padding:0 4px;border-radius:5px;
  font-family:inherit;-webkit-appearance:none;appearance:none;
  transition:color .15s;
}
.del-btn:active{color:#ff6b6b}

.empty{text-align:center;padding:44px 20px;color:var(--muted);animation:fadeUp .4s ease both}
.empty .ico{font-size:38px;margin-bottom:14px;opacity:.35}
.empty p{font-size:11px;letter-spacing:.15em;text-transform:uppercase}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
</style>
</head>
<body>

<header>
  <p class="lbl">Twoja biblioteka</p>
  <h1>Sledz <em>postepy</em><br>w czytaniu</h1>
</header>

<div class="card">
  <div class="field">
    <label>Tytul ksiazki</label>
    <input type="text" id="inp-title" placeholder="np. Wladca Pierscieni" autocomplete="off"/>
  </div>
  <div class="row">
    <div class="field">
      <label>Liczba stron</label>
      <input type="number" id="inp-total" placeholder="350" min="1"/>
    </div>
    <div class="field">
      <label>Przeczytane</label>
      <input type="number" id="inp-read" placeholder="0" min="0"/>
    </div>
  </div>
  <button class="add-btn" id="add-btn">Dodaj ksiazke</button>
</div>

<div id="books-list"></div>

<script>
(function(){

  var store = (function(){
    var mem = {};
    try{
      localStorage.setItem('_chk','1');
      localStorage.removeItem('_chk');
      return {
        get: function(k){ return localStorage.getItem(k); },
        set: function(k,v){ localStorage.setItem(k,v); }
      };
    } catch(e){
      return {
        get: function(k){ return (k in mem) ? mem[k] : null; },
        set: function(k,v){ mem[k] = v; }
      };
    }
  })();

  var books = [];
  try{ books = JSON.parse(store.get('books') || '[]'); } catch(e){ books = []; }

  function getColor(p){
    if(p === 100) return {bar:'#a3e635', label:'ukonczona'};
    if(p >= 75)   return {bar:'#34d399', label:'prawie koniec'};
    if(p >= 50)   return {bar:'#60a5fa', label:'w polowie'};
    if(p >= 25)   return {bar:'#f59e0b', label:'w trakcie'};
    if(p > 0)     return {bar:'#f87171', label:'zaczeeta'};
    return          {bar:'#4b4b5a', label:'nierozpoczeta'};
  }

  function calcPct(b){
    if(!b.total) return 0;
    return Math.min(100, Math.round((b.read / b.total) * 100));
  }

  function esc(s){
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function save(){
    try{ store.set('books', JSON.stringify(books)); } catch(e){}
  }

  function render(){
    var list = document.getElementById('books-list');
    if(!list) return;
    if(books.length === 0){
      list.innerHTML = '<div class="empty"><div class="ico">&#128218;</div><p>Brak dodanych ksiazek</p></div>';
      return;
    }
    var html = '';
    for(var i = 0; i < books.length; i++){
      var b = books[i];
      var p = calcPct(b);
      var c = getColor(p);
      var left = Math.max(0, b.total - b.read);
      var leftTxt = left > 0 ? 'pozostalo ' + left + ' str.' : '&#10003; przeczytana';
      html +=
        '<div class="book-item" id="bi-'+i+'" style="--bc:'+c.bar+'">' +
          '<div class="book-top">' +
            '<div class="book-name">'+esc(b.title)+'</div>' +
            '<div class="book-pct" id="bp-'+i+'" style="color:'+c.bar+'">'+p+'<span style="font-size:13px;opacity:.5">%</span></div>' +
          '</div>' +
          '<div class="read-row">' +
            '<button class="step-btn" id="sm-'+i+'" type="button">&#8722;</button>' +
            '<input class="ri" type="number" id="ri-'+i+'" value="'+b.read+'" min="0" max="'+b.total+'"/>' +
            '<button class="step-btn" id="sp-'+i+'" type="button">+</button>' +
            '<span class="sep">/</span>' +
            '<span class="total-lbl">'+b.total+' stron</span>' +
          '</div>' +
          '<div class="bar-track">' +
            '<div class="bar-fill" id="bf-'+i+'" style="width:'+p+'%;--bc:'+c.bar+'"></div>' +
          '</div>' +
          '<div class="book-footer">' +
            '<span class="pages-left" id="pl-'+i+'">'+leftTxt+'</span>' +
            '<div class="foot-right">' +
              '<span class="badge" id="bd-'+i+'" style="background:'+c.bar+'22;color:'+c.bar+'">'+c.label+'</span>' +
              '<button class="del-btn" id="db-'+i+'" type="button">&#215;</button>' +
            '</div>' +
          '</div>' +
        '</div>';
    }
    list.innerHTML = html;
    bindAll();
  }

  function bindAll(){
    for(var i = 0; i < books.length; i++){
      (function(idx){
        var sm = document.getElementById('sm-'+idx);
        var sp = document.getElementById('sp-'+idx);
        var ri = document.getElementById('ri-'+idx);
        var db = document.getElementById('db-'+idx);
        if(sm) sm.onclick = function(){ doStep(idx, -1); };
        if(sp) sp.onclick = function(){ doStep(idx,  1); };
        if(ri) ri.oninput = function(){ doUpdate(idx, this.value); };
        if(db) db.onclick = function(){ doDelete(idx); };
      })(i);
    }
  }

  function refreshCard(idx){
    var b = books[idx];
    var p = calcPct(b);
    var c = getColor(p);
    var left = Math.max(0, b.total - b.read);
    var leftTxt = left > 0 ? 'pozostalo '+left+' str.' : '\u2713 przeczytana';

    var card = document.getElementById('bi-'+idx);
    if(card) card.style.setProperty('--bc', c.bar);

    var bp = document.getElementById('bp-'+idx);
    if(bp){ bp.style.color = c.bar; bp.innerHTML = p+'<span style="font-size:13px;opacity:.5">%</span>'; }

    var bf = document.getElementById('bf-'+idx);
    if(bf){ bf.style.width = p+'%'; bf.style.setProperty('--bc', c.bar); }

    var pl = document.getElementById('pl-'+idx);
    if(pl) pl.textContent = leftTxt;

    var bd = document.getElementById('bd-'+idx);
    if(bd){ bd.textContent = c.label; bd.style.background = c.bar+'22'; bd.style.color = c.bar; }
  }

  function doUpdate(idx, val){
    var v = parseInt(val, 10);
    if(isNaN(v) || v < 0) v = 0;
    if(v > books[idx].total) v = books[idx].total;
    books[idx].read = v;
    save();
    refreshCard(idx);
  }

  function doStep(idx, delta){
    var v = books[idx].read + delta;
    if(v < 0) v = 0;
    if(v > books[idx].total) v = books[idx].total;
    books[idx].read = v;
    var ri = document.getElementById('ri-'+idx);
    if(ri) ri.value = v;
    save();
    refreshCard(idx);
  }

  function doDelete(idx){
    books.splice(idx, 1);
    save();
    render();
  }

  function shake(el){
    if(!el) return;
    el.style.borderColor = '#f87171';
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = 'shake .35s ease';
    setTimeout(function(){ el.style.borderColor = ''; el.style.animation = ''; }, 500);
  }

  function addBook(){
    var tEl  = document.getElementById('inp-title');
    var ttEl = document.getElementById('inp-total');
    var rEl  = document.getElementById('inp-read');
    if(!tEl || !ttEl || !rEl) return;

    var title = tEl.value.trim();
    var total = parseInt(ttEl.value, 10);
    var read  = parseInt(rEl.value,  10);

    if(!title)              { shake(tEl);  return; }
    if(!total || total < 1) { shake(ttEl); return; }
    if(isNaN(read) || read < 0) { shake(rEl); return; }
    if(read > total)        { shake(rEl);  return; }

    books.unshift({title: title, total: total, read: read});
    save();
    tEl.value  = '';
    ttEl.value = '';
    rEl.value  = '';
    tEl.focus();
    render();
  }

  var addBtn = document.getElementById('add-btn');
  if(addBtn) addBtn.onclick = addBook;

  document.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      var id = document.activeElement && document.activeElement.id;
      if(id === 'inp-title' || id === 'inp-total' || id === 'inp-read'){
        addBook();
      }
    }
  });

  render();

})();
</script>
</body>
</html>
